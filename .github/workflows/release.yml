name: Release

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Roda em todo push na main/master: abre/atualiza a PR de release. So publica release ao mergear essa PR.
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Release Please outputs (for debugging)
        if: always()
        run: |
          echo "release_created=${{ steps.release.outputs.release_created }}"
          echo "releases_created=${{ steps.release.outputs.releases_created }}"
          echo "tag_name=${{ steps.release.outputs.tag_name }}"

  # Roda so quando este workflow publica release no MESMO run (merge da PR de release no push).
  build-and-upload:
    if: >-
      github.event_name == 'push' &&
      (needs.release-please.outputs.release_created == 'true' ||
       needs.release-please.outputs.releases_created == 'true')
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Build jar
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VER="${TAG#v}"
          chmod +x ./gradlew
          ./gradlew clean jar -PreleaseVersion="$VER"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: build/libs/paragonn-system.jar

  build-and-upload-on-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Build jar
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          chmod +x ./gradlew
          ./gradlew clean jar -PreleaseVersion="$VER"

      - name: Upload jar to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          build/libs/paragonn-system.jar
          --clobber
